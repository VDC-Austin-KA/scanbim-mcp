name = "scanbim-mcp"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Bind to your existing D1 database
[[d1_databases]]
binding = "DB"
database_name = "ian-martin-dashboard"
database_id = "b7308a33-501f-4281-b85d-905bb8f3dbeb"

# Bind to your existing KV namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "60b27eed538b4c3f95016b93baa03e33"

